<table class="table text-center">
    <thead>
        <tr>
            <th>Imagen</th>
            <th>Nombre</th>
            <th>Tipo</th>
            <th>Precio</th>
            <th>Stock</th>
            <th>Comprar</th>
        </tr>
    </thead>
    <tbody>
        @for (beer of beers; track beer.name) {
        <tr [ngClass]="{'clearance' : beer.clearance}">
            <td><img [src]="beer.image" [alt]="beer.name"/></td>
            <td>{{beer.name}}</td>
            <td>{{beer.type}}</td>
            <td>{{beer.price}}</td>
            <td>
                @if (beer.stock == 0) {
                    <span class="alert alert-warning">SIN STOCK</span>
                }
            </td>
            <td>
                @if (beer.stock) {
                    <app-input-number [(quantity)]="beer.quantity" [max]="beer.stock" (maxReached)="maxReached($event)"></app-input-number>
                }
                <button class="btn btn-primary" (click)="addToCart(beer)">Comprar</button>
            </td>
        </tr>
        }
    </tbody>
</table>

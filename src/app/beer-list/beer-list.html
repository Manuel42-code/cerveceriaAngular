<table class="table text-center">
    <thead>
        <tr>
            <th>Imagen</th>
            <th>Nombre</th>
            <th>Tipo</th>
            <th>Precio</th>
            <th>Stock</th>
            <th>Comprar</th>
        </tr>
    </thead>
    <tbody>
        <tr *ngFor="let beer of beers" [ngClass]="{'clearance' : beer.clearance}" >
            <td><img [src]="beer.image" [alt]="beer.name"/></td>
            <td>{{beer.name}}</td>
            <td>{{beer.type}}</td>
            <td>{{beer.price}}</td>
            <td><span class="alert alert-warning" *ngIf="beer.stock == 0">SIN STOCK</span></td>
            <td>
                <app-input-number [(quantity)]="beer.quantity" [max]="beer.stock" *ngIf="beer.stock" (maxReached)="maxReached($event)"></app-input-number>
                <button class="btn btn-primary" (click)="addToCart(beer)">Comprar</button>
            </td>
        </tr>
    </tbody>
</table>
